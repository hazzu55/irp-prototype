/* ── SVG 도넛 ── */
function MiniDonut({ data, colors }) {
  const sz=68, cx=34, cy=34, OR=32, IR=18;
  const total = data.reduce((s,d)=>s+d.value,0);
  let a = -Math.PI/2;
  const slices = data.map((d,i)=>{
    const sw=(d.value/total)*2*Math.PI;
    const x1=cx+OR*Math.cos(a), y1=cy+OR*Math.sin(a);
    const x2=cx+OR*Math.cos(a+sw), y2=cy+OR*Math.sin(a+sw);
    const x3=cx+IR*Math.cos(a+sw), y3=cy+IR*Math.sin(a+sw);
    const x4=cx+IR*Math.cos(a), y4=cy+IR*Math.sin(a);
    const lg=sw>Math.PI?1:0;
    const path=`M${x1},${y1} A${OR},${OR},0,${lg},1,${x2},${y2} L${x3},${y3} A${IR},${IR},0,${lg},0,${x4},${y4} Z`;
    a+=sw;
    return {path, color:colors[i]};
  });
  return (
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} style={{flexShrink:0}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color}/>)}
    </svg>
  );
}

      <OptionCard option="A" data={optionA} colors={PIE_A} selected={sel==="A"} onClick={()=>!confirmed&&setSel("A")} confirmed={confirmed}/>
      <OptionCard option="B" data={optionB} colors={PIE_B} selected={sel==="B"} onClick={()=>!confirmed&&setSel("B")} confirmed={confirmed}/>
      {sel&&!confirmed&&(
        <button onClick={confirm} style={{width:"100%",padding:"14px 0",borderRadius:12,border:"none",background:DS.btnPrimary,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:DS.shadow03}}>
          옵션 {sel} 적용하기 →
        </button>
      )}
      {done&&(
        <div style={{display:"flex",alignItems:"flex-end",gap:8,animation:"fadeUp 0.35s ease forwards"}}>
          <AgentAvatar size={28}/>
          <div style={{borderRadius:"16px 16px 16px 4px",border:"1px solid #7CF8D3",background:DS.bgSuccess,padding:"10px 14px",fontSize:14,lineHeight:1.5,color:DS.textPrimary,maxWidth:280}}>
            ✅ 옵션 {sel} 리밸런싱 신청 완료! 다음 영업일 종가 기준으로 실행되며, 3~5일 소요 예정입니다.
          </div>
        </div>
      )}
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [items,setItems]=useState([]);
  const [typingId,setTypingId]=useState(null);
  const bottomRef=useRef(null);
  const timers=useRef([]);

  useEffect(()=>{
    SCRIPT.forEach(step=>{
      const t=setTimeout(()=>{
        if(step.type==="agent"){
          setTypingId(step.id);
          const t2=setTimeout(()=>{setTypingId(null);setItems(p=>[...p,step]);},900);
          timers.current.push(t2);
        } else {
          setItems(p=>[...p,step]);
        }
      },step.delay);
      timers.current.push(t);
    });
    return ()=>timers.current.forEach(clearTimeout);
  },[]);

  useEffect(()=>{
    setTimeout(()=>bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"}),50);
  },[items,typingId]);

  const renderWidget=w=>{
    if(w==="allocationCard") return <AllocationCard/>;
    if(w==="tipBox1")        return <TipBox1/>;
    if(w==="actionButtons")  return <ActionButtons/>;
    if(w==="reasonCards")    return <ReasonCards/>;
    if(w==="tipBox2")        return <TipBox2/>;
    if(w==="portfolioCard")  return <PortfolioCard/>;
    if(w==="optionCards")    return <OptionCards/>;
    return null;
  };

  return (
    <div style={{display:"flex",flexDirection:"column",width:"100%",height:"100%",background:"#fff"}}>

      {/* 상태바 여백 */}
      <div style={{height:44,background:"#fff",flexShrink:0}}/>

      {/* 헤더 */}
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${DS.borderTertiary}`,background:"#fff",display:"flex",alignItems:"center",gap:10,boxShadow:DS.shadow01,flexShrink:0}}>
        <button style={{width:32,height:32,borderRadius:10,background:DS.bgSecondary,border:"none",fontSize:16,color:DS.textPrimary,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <AgentAvatar size={36}/>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:DS.textPrimary}}>AI 자산관리 에이전트</div>
          <div style={{fontSize:12,color:DS.green500,display:"flex",alignItems:"center",gap:4,marginTop:1}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:DS.green500}}/>
            IRP 계좌 분석 중
          </div>
        </div>
        <button style={{width:32,height:32,borderRadius:10,background:DS.bgSecondary,border:"none",fontSize:18,color:DS.textTertiary,cursor:"pointer"}}>⋯</button>
      </div>

      {/* 채팅 바디 */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0",background:DS.bgSecondary,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"center"}}>
          <div style={{padding:"4px 12px",borderRadius:99,background:DS.bgTertiary,border:`1px solid ${DS.borderTertiary}`,fontSize:11,color:DS.textTertiary}}>오늘 09:44</div>
        </div>

        {items.map(item=>{
          if(item.type==="agent") return (
            <div key={item.id} className="msg-in" style={{display:"flex",alignItems:"flex-end",gap:8}}>
              <AgentAvatar size={28}/>
              <div style={{background:"#fff",border:`1px solid ${DS.borderTertiary}`,borderRadius:"16px 16px 16px 4px",padding:"10px 14px",fontSize:14,lineHeight:1.6,color:DS.textPrimary,maxWidth:"72%",whiteSpace:"pre-line",boxShadow:DS.shadow01}}>{item.text}</div>
              <span style={{fontSize:11,color:DS.textQuaternary,marginBottom:2,whiteSpace:"nowrap"}}>09:44</span>
            </div>
          );
          if(item.type==="user") return (
            <div key={item.id} className="msg-in" style={{display:"flex",alignItems:"flex-end",gap:8,justifyContent:"flex-end"}}>
              <span style={{fontSize:11,color:DS.textQuaternary,marginBottom:2,whiteSpace:"nowrap"}}>09:44</span>
              <div style={{background:"#FFCE39",borderRadius:"16px 16px 4px 16px",padding:"10px 14px",fontSize:14,lineHeight:1.6,color:DS.gray800,maxWidth:"60%",fontWeight:500}}>{item.text}</div>
              <UserAvatar/>
            </div>
          );
          if(item.type==="widget"){
            const full=["actionButtons","reasonCards","optionCards"].includes(item.widget);
            return <div key={item.id} className="msg-in" style={{marginLeft:full?0:36}}>{renderWidget(item.widget)}</div>;
          }
          return null;
        })}

        {typingId&&(
          <div className="msg-in" style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <AgentAvatar size={28}/><TypingBubble/>
          </div>
        )}
        <div ref={bottomRef} style={{height:16}}/>
      </div>

      {/* 하단 입력창 */}
      <div style={{padding:"12px 16px 20px",background:"#fff",borderTop:`1px solid ${DS.borderTertiary}`,boxShadow:"0 -2px 12px rgba(33,37,40,0.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:24,border:`1.5px solid ${DS.borderTertiary}`,background:DS.bgSecondary}}>
          <span style={{flex:1,fontSize:14,color:DS.textQuaternary}}>에이전트에게 질문하기...</span>
          <div style={{width:32,height:32,borderRadius:"50%",background:DS.btnPrimary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#fff"}}>↑</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
